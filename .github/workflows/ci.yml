name: backend-ci

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER
          POSTGRES_PASSWOR
          POSTGRES_DB
        ports:
          - "5432:5432"
        options: >-
          --health-cmd="pg_isready -U postgres -d getonboard_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_HOST
      DB_PORT
      DB_USER
      DB_PASSWORD
      DB_NAME
      JWT_SECRET
      JWT_REFRESH_SECRET
      CLOUDINARY_CLOUD_NAME
      CLOUDINARY_API_KEY
      CLOUDINARY_API_SECRET

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: E2E tests
        run: npm run test:e2e

      - name: Build
        run: npm run build

      # ─── Security & Container Scanning ───

      - name: Security audit (npm)
        run: npm audit --audit-level=high || true

      - name: Build Docker image
        run: docker build -t getonboard-backend:${{ github.sha }} .

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: getonboard-backend:${{ github.sha }}
          format: 'table'
          severity: 'CRITICAL,HIGH'
