name: backend-cd

on:
  push:
    branches:
      - main
      - test

permissions:
  contents: read

jobs:
  deploy-test:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/test'
    environment:
      name: test
    steps:
      - name: Deploy to Render (dev/test)
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_TEST }}"
          echo "✅ Deploy triggered for test environment"
          echo "Commit: $GITHUB_SHA"

  deploy-prod:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
    steps:
      - name: Deploy to Render (production)
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_PROD }}"
          echo "✅ Deploy triggered for production environment"
          echo "Commit: $GITHUB_SHA"
