# NOTA: Este archivo es una PLANTILLA para referencia.
# Los valores reales (base64) NUNCA deben commitearse al repositorio.
# Crear con: kubectl create secret generic backend-secrets --from-env-file=.env -n getonboard
#
# Para generar los valores base64:
#   echo -n "mi_valor_secreto" | base64
#
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: getonboard
  labels:
    app: getonboard-backend
type: Opaque
data:
  # Valores de ejemplo en base64 — REEMPLAZAR con valores reales antes de aplicar
  DB_HOST: <BASE64_ENCODED_DB_HOST>
  DB_USER: <BASE64_ENCODED_DB_USER>
  DB_PASSWORD: <BASE64_ENCODED_DB_PASSWORD>
  DB_NAME: <BASE64_ENCODED_DB_NAME>
  JWT_SECRET: <BASE64_ENCODED_JWT_SECRET>
  JWT_REFRESH_SECRET: <BASE64_ENCODED_JWT_REFRESH_SECRET>
  CLOUDINARY_CLOUD_NAME: <BASE64_ENCODED_CLOUDINARY_CLOUD_NAME>
  CLOUDINARY_API_KEY: <BASE64_ENCODED_CLOUDINARY_API_KEY>
  CLOUDINARY_API_SECRET: <BASE64_ENCODED_CLOUDINARY_API_SECRET>
