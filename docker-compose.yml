version: '3.8'

networks:
  getonboard-net:
    driver: bridge
services:
  db:
    image: postgres:15
    container_name: getonboard_db
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - getonboard-net

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: getonboard_backend
    ports:
      - "3004:${PORT}"
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - NODE_ENV=development
      - PORT
      - DB_PORT
      - DB_USER
      - DB_PASSWORD
      - DB_NAME
      - JWT_SECRET
      - CLOUDINARY_CLOUD_NAME
      - CLOUDINARY_API_KEY
      - CLOUDINARY_API_SECRET
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:${PORT}/health" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    command: npm run start:dev
    networks:
      - getonboard-net

volumes:
  postgres_data:
